# ==============================================================================
# PROJECT
# ==============================================================================

[project]
site_name = "Principios de Computación y Programación"
site_description = "Material de la asignatura IBT 114."
site_author = "Benjamin Serrano"
site_url = "https://benjaminserrano.github.io/principios-programacion"

extra_css = ["assets/css/custom.css"]
extra_javascript = [
    "assets/js/clipboard.js",
    "assets/js/mathjax.js",
    "assets/js/presentation.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]


# ==============================================================================
# NAVIGATION
# ==============================================================================

[[project.nav]]
"Inicio" = "index.md"

[[project.nav]]
"Fundamentos del lenguaje" = [
    "core/index.md",
    {"Introducción" = [
        "core/introduction/index.md",
        "core/introduction/machine.md",
        "core/introduction/flowcharts.md",
        "core/introduction/coding.md",
    ]},
    {"Entornos de desarrollo" = [
        "core/devenv/index.md",
        "core/devenv/vscode.md",
    ]},
    {"Tipos de datos" = [
        "core/datatypes/index.md",
        "core/datatypes/data.md",
        "core/datatypes/numbers.md",
        "core/datatypes/strings.md",
    ]},
    {"Control de flujo" = [
        "core/controlflow/index.md",
        "core/controlflow/conditionals.md",
        "core/controlflow/loops.md",
        "core/controlflow/for-examples.md",
    ]},
    {"Estructuras de datos" = [
        "core/datastructures/index.md",
        "core/datastructures/lists.md",
    ]},
    {"Modularidad" = [
        "core/modularity/index.md",
        "core/modularity/functions.md",
    ]},
]

# ==============================================================================
# THEME
# ==============================================================================

[project.theme]
language = "es"
logo = "assets/images/logo_recortado.png"
favicon = "assets/images/logo_recortado.png"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# ==============================================================================
# TEMA CLARO
# ==============================================================================

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "indigo"
accent = "teal"

# ==============================================================================
# TEMA OSCURO
# ==============================================================================

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
primary = "indigo"
accent = "teal"


# ==============================================================================
# MARKDOWN EXTENSIONS
# ==============================================================================

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]
[project.markdown_extensions.pymdownx.blocks.caption]
